<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="50%" style="stop-color:#1b2d4a"/>
      <stop offset="100%" style="stop-color:#0a4d68"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
    <linearGradient id="doc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa"/>
      <stop offset="100%" style="stop-color:#b2ebf2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00b4d8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Decorative dots pattern -->
  <g opacity="0.06" fill="#00b4d8">
    <circle cx="50" cy="50" r="3"/><circle cx="100" cy="50" r="3"/><circle cx="150" cy="50" r="3"/>
    <circle cx="200" cy="50" r="3"/><circle cx="250" cy="50" r="3"/><circle cx="300" cy="50" r="3"/>
    <circle cx="50" cy="100" r="3"/><circle cx="100" cy="100" r="3"/><circle cx="150" cy="100" r="3"/>
    <circle cx="200" cy="100" r="3"/><circle cx="250" cy="100" r="3"/><circle cx="300" cy="100" r="3"/>
    <circle cx="500" cy="300" r="3"/><circle cx="550" cy="300" r="3"/><circle cx="600" cy="300" r="3"/>
    <circle cx="650" cy="300" r="3"/><circle cx="700" cy="300" r="3"/><circle cx="750" cy="300" r="3"/>
    <circle cx="500" cy="350" r="3"/><circle cx="550" cy="350" r="3"/><circle cx="600" cy="350" r="3"/>
    <circle cx="650" cy="350" r="3"/><circle cx="700" cy="350" r="3"/><circle cx="750" cy="350" r="3"/>
  </g>

  <!-- Background shapes -->
  <circle cx="680" cy="100" r="140" fill="#00b4d8" opacity="0.04"/>
  <circle cx="120" cy="320" r="120" fill="#0077b6" opacity="0.06"/>

  <!-- Document/Checklist Icon -->
  <g transform="translate(400, 145)" filter="url(#shadow)">
    <!-- Document body -->
    <rect x="-40" y="-55" width="80" height="105" rx="8" fill="url(#doc)"/>
    <!-- Folded corner -->
    <path d="M20,-55 L40,-55 L40,-35 Z" fill="#80deea"/>
    <path d="M20,-55 L20,-35 L40,-35" fill="none" stroke="#4dd0e1" stroke-width="1"/>

    <!-- Checklist items -->
    <!-- Item 1 - checked -->
    <rect x="-28" y="-38" width="14" height="14" rx="3" fill="#0077b6" opacity="0.2" stroke="#0077b6" stroke-width="1.5"/>
    <path d="M-25,-32 L-22,-28 L-17,-36" fill="none" stroke="#00b4d8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="-8" y="-35" width="35" height="6" rx="3" fill="#0077b6" opacity="0.3"/>

    <!-- Item 2 - checked -->
    <rect x="-28" y="-16" width="14" height="14" rx="3" fill="#0077b6" opacity="0.2" stroke="#0077b6" stroke-width="1.5"/>
    <path d="M-25,-10 L-22,-6 L-17,-14" fill="none" stroke="#00b4d8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="-8" y="-13" width="30" height="6" rx="3" fill="#0077b6" opacity="0.3"/>

    <!-- Item 3 - unchecked -->
    <rect x="-28" y="6" width="14" height="14" rx="3" fill="#0077b6" opacity="0.1" stroke="#0077b6" stroke-width="1.5"/>
    <rect x="-8" y="9" width="38" height="6" rx="3" fill="#0077b6" opacity="0.2"/>

    <!-- Item 4 - unchecked -->
    <rect x="-28" y="28" width="14" height="14" rx="3" fill="#0077b6" opacity="0.1" stroke="#0077b6" stroke-width="1.5"/>
    <rect x="-8" y="31" width="25" height="6" rx="3" fill="#0077b6" opacity="0.2"/>

    <!-- Spec badge -->
    <rect x="25" y="20" width="32" height="18" rx="4" fill="#00b4d8"/>
    <text x="41" y="33" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" font-weight="700" fill="#ffffff">SPEC</text>
  </g>

  <!-- Connecting lines from doc to code brackets -->
  <g opacity="0.3" stroke="#00b4d8" stroke-width="1.5">
    <path d="M330,130 Q290,145 290,160" fill="none" stroke-dasharray="4,4"/>
    <path d="M470,130 Q510,145 510,160" fill="none" stroke-dasharray="4,4"/>
  </g>

  <!-- Code brackets -->
  <g opacity="0.35">
    <text x="275" y="185" font-family="monospace" font-size="28" fill="#00b4d8">{</text>
    <text x="500" y="185" font-family="monospace" font-size="28" fill="#00b4d8">}</text>
  </g>

  <!-- Title -->
  <text x="400" y="280" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="1">Spec-Driven Development</text>

  <!-- Subtitle line -->
  <line x1="280" y1="300" x2="520" y2="300" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>

  <!-- Bottom accent bar -->
  <rect y="390" width="800" height="10" fill="url(#accent)" opacity="0.8"/>
</svg>