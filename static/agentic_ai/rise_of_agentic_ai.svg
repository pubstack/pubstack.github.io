<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#3f8efc"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#6c63ff"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#6c63ff" flood-opacity="0.3"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#6c63ff" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="650" cy="80" r="120" fill="#6c63ff" opacity="0.06"/>
  <circle cx="700" cy="120" r="80" fill="#3f8efc" opacity="0.08"/>
  <circle cx="150" cy="350" r="100" fill="#a78bfa" opacity="0.05"/>

  <!-- Brain/Robot Icon -->
  <g transform="translate(400, 155)" filter="url(#shadow)">
    <!-- Robot head -->
    <rect x="-45" y="-40" width="90" height="75" rx="18" fill="url(#accent)"/>
    <!-- Antenna -->
    <line x1="0" y1="-40" x2="0" y2="-58" stroke="url(#glow)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="-62" r="6" fill="#a78bfa" filter="url(#glow-filter)"/>
    <!-- Eyes -->
    <circle cx="-18" cy="-12" r="10" fill="#1a1a2e"/>
    <circle cx="18" cy="-12" r="10" fill="#1a1a2e"/>
    <circle cx="-16" cy="-13" r="4" fill="#00d4ff"/>
    <circle cx="20" cy="-13" r="4" fill="#00d4ff"/>
    <!-- Mouth / processor lines -->
    <rect x="-22" y="12" width="44" height="3" rx="1.5" fill="#1a1a2e" opacity="0.6"/>
    <rect x="-22" y="19" width="44" height="3" rx="1.5" fill="#1a1a2e" opacity="0.6"/>
    <rect x="-22" y="26" width="44" height="3" rx="1.5" fill="#1a1a2e" opacity="0.6"/>
    <!-- Brain pattern overlay -->
    <path d="M-20,-30 Q-5,-45 5,-28 Q15,-42 25,-30" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
    <!-- Side elements -->
    <rect x="-55" y="-15" width="8" height="20" rx="3" fill="url(#glow)"/>
    <rect x="47" y="-15" width="8" height="20" rx="3" fill="url(#glow)"/>
  </g>

  <!-- Rising arrows around the icon -->
  <g opacity="0.4">
    <path d="M320,180 L320,140 L310,150 M320,140 L330,150" fill="none" stroke="#6c63ff" stroke-width="2" stroke-linecap="round"/>
    <path d="M480,180 L480,140 L470,150 M480,140 L490,150" fill="none" stroke="#3f8efc" stroke-width="2" stroke-linecap="round"/>
    <path d="M340,200 L340,165 L332,173 M340,165 L348,173" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M460,200 L460,165 L452,173 M460,165 L468,173" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="400" y="285" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="1">The Rise of Agentic AI</text>

  <!-- Subtitle line -->
  <line x1="300" y1="305" x2="500" y2="305" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>

  <!-- Bottom accent bar -->
  <rect y="390" width="800" height="10" fill="url(#accent)" opacity="0.8"/>
</svg>