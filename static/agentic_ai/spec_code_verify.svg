<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#2d1052"/>
      <stop offset="100%" style="stop-color:#3d1466"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e040fb"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e040fb"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#e040fb" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Background subtle elements -->
  <circle cx="400" cy="150" r="140" fill="#e040fb" opacity="0.03"/>
  <circle cx="250" cy="350" r="100" fill="#7c4dff" opacity="0.04"/>
  <circle cx="600" cy="80" r="80" fill="#e040fb" opacity="0.03"/>

  <!-- Circular arrows forming the loop -->
  <g transform="translate(400, 140)" filter="url(#glow)">
    <!-- Circular path (the loop) -->
    <path d="M0,-70 A70,70 0 0,1 60.6,35" fill="none" stroke="url(#arrow-grad)" stroke-width="3" opacity="0.5"/>
    <path d="M60.6,35 A70,70 0 0,1 -60.6,35" fill="none" stroke="url(#arrow-grad)" stroke-width="3" opacity="0.5"/>
    <path d="M-60.6,35 A70,70 0 0,1 0,-70" fill="none" stroke="url(#arrow-grad)" stroke-width="3" opacity="0.5"/>

    <!-- Arrow heads -->
    <polygon points="0,-78 8,-65 -8,-65" fill="#e040fb" transform="rotate(30, 0, -70)"/>
    <polygon points="60.6,27 68,40 53,40" fill="#b388ff" transform="rotate(150, 60.6, 35)"/>
    <polygon points="-60.6,27 -53,40 -68,40" fill="#7c4dff" transform="rotate(270, -60.6, 35)"/>
  </g>

  <!-- SPEC node (top) -->
  <g transform="translate(400, 70)" filter="url(#shadow)">
    <rect x="-35" y="-20" width="70" height="40" rx="10" fill="#e040fb" opacity="0.9"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">SPEC</text>
  </g>

  <!-- CODE node (bottom right) -->
  <g transform="translate(465, 180)" filter="url(#shadow)">
    <rect x="-35" y="-20" width="70" height="40" rx="10" fill="#b388ff" opacity="0.9"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">CODE</text>
  </g>

  <!-- VERIFY node (bottom left) -->
  <g transform="translate(335, 180)" filter="url(#shadow)">
    <rect x="-38" y="-20" width="76" height="40" rx="10" fill="#7c4dff" opacity="0.9"/>
    <text x="0" y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">VERIFY</text>
  </g>

  <!-- Small icons at each node -->
  <!-- Spec: document -->
  <g transform="translate(400, 50)" opacity="0.6">
    <rect x="-5" y="-7" width="10" height="12" rx="1" fill="none" stroke="#fff" stroke-width="1"/>
    <line x1="-3" y1="-3" x2="3" y2="-3" stroke="#fff" stroke-width="0.7"/>
    <line x1="-3" y1="0" x2="3" y2="0" stroke="#fff" stroke-width="0.7"/>
    <line x1="-3" y1="3" x2="1" y2="3" stroke="#fff" stroke-width="0.7"/>
  </g>

  <!-- Code: brackets -->
  <g transform="translate(465, 162)" opacity="0.6">
    <text x="0" y="0" text-anchor="middle" font-family="monospace" font-size="12" fill="#fff">&lt;/&gt;</text>
  </g>

  <!-- Verify: checkmark -->
  <g transform="translate(335, 162)" opacity="0.6">
    <path d="M-5,0 L-2,3 L5,-4" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Infinity/loop symbol hint -->
  <g transform="translate(400, 140)" opacity="0.08">
    <path d="M-30,0 Q-30,-25 -10,-25 Q10,-25 10,0 Q10,25 30,25 Q50,25 50,0 Q50,-25 30,-25 Q10,-25 10,0 Q10,25 -10,25 Q-30,25 -30,0 Z" fill="#e040fb" stroke="none"/>
  </g>

  <!-- Title -->
  <text x="400" y="275" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="1">Spec-Code-Verify Loop</text>

  <!-- Subtitle line -->
  <line x1="270" y1="295" x2="530" y2="295" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>

  <!-- Bottom accent bar -->
  <rect y="390" width="800" height="10" fill="url(#accent)" opacity="0.8"/>
</svg>