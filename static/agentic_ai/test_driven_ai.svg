<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a14"/>
      <stop offset="50%" style="stop-color:#0d2818"/>
      <stop offset="100%" style="stop-color:#0a3d2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c853"/>
      <stop offset="100%" style="stop-color:#00bfa5"/>
    </linearGradient>
    <linearGradient id="shield-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00e676"/>
      <stop offset="100%" style="stop-color:#00bfa5"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00c853" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Hex pattern background -->
  <g opacity="0.04" stroke="#00c853" stroke-width="1" fill="none">
    <polygon points="100,40 130,55 130,85 100,100 70,85 70,55"/>
    <polygon points="160,40 190,55 190,85 160,100 130,85 130,55"/>
    <polygon points="130,85 160,100 160,130 130,145 100,130 100,100"/>
    <polygon points="640,280 670,295 670,325 640,340 610,325 610,295"/>
    <polygon points="700,280 730,295 730,325 700,340 670,325 670,295"/>
    <polygon points="670,325 700,340 700,370 670,385 640,370 640,340"/>
  </g>

  <!-- Background glow -->
  <circle cx="400" cy="150" r="120" fill="#00c853" opacity="0.04"/>

  <!-- Shield Icon -->
  <g transform="translate(400, 140)" filter="url(#shadow)">
    <!-- Shield shape -->
    <path d="M0,-60 L50,-40 L50,10 Q50,50 0,70 Q-50,50 -50,10 L-50,-40 Z" fill="url(#shield-fill)" opacity="0.9"/>
    <path d="M0,-60 L50,-40 L50,10 Q50,50 0,70 Q-50,50 -50,10 L-50,-40 Z" fill="none" stroke="#00ffab" stroke-width="1.5" opacity="0.5"/>

    <!-- Inner shield highlight -->
    <path d="M0,-45 L35,-30 L35,5 Q35,38 0,55 Q-35,38 -35,5 L-35,-30 Z" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>

    <!-- Checkmark -->
    <path d="M-18,5 L-5,20 L22,-12" fill="none" stroke="#0a1a14" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-18,5 L-5,20 L22,-12" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  </g>

  <!-- Test result indicators floating around shield -->
  <g filter="url(#glow)">
    <!-- Pass indicators -->
    <g transform="translate(310, 110)">
      <circle r="8" fill="#00c853" opacity="0.7"/>
      <path d="M-4,0 L-1,3 L4,-3" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <g transform="translate(320, 165)">
      <circle r="8" fill="#00c853" opacity="0.7"/>
      <path d="M-4,0 L-1,3 L4,-3" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <g transform="translate(490, 110)">
      <circle r="8" fill="#00c853" opacity="0.7"/>
      <path d="M-4,0 L-1,3 L4,-3" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <g transform="translate(480, 165)">
      <circle r="8" fill="#00c853" opacity="0.7"/>
      <path d="M-4,0 L-1,3 L4,-3" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- One "running" indicator -->
    <g transform="translate(340, 200)">
      <circle r="8" fill="#ffd600" opacity="0.5"/>
      <circle r="2" fill="#fff"/>
    </g>
  </g>

  <!-- Code snippets faded in background -->
  <g opacity="0.08" font-family="monospace" font-size="11" fill="#00e676">
    <text x="60" y="220">assert result == expected</text>
    <text x="550" y="100">test_agent_output()</text>
    <text x="80" y="320">verify(spec, code)</text>
    <text x="520" y="340">coverage: 98%</text>
  </g>

  <!-- Title -->
  <text x="400" y="280" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="1">Test-Driven AI</text>

  <!-- Subtitle line -->
  <line x1="300" y1="300" x2="500" y2="300" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>

  <!-- Bottom accent bar -->
  <rect y="390" width="800" height="10" fill="url(#accent)" opacity="0.8"/>
</svg>