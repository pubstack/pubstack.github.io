<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="50%" style="stop-color:#1b3a4b"/>
      <stop offset="100%" style="stop-color:#274c77"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#0288d1"/>
    </linearGradient>
    <linearGradient id="warm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb74d"/>
      <stop offset="100%" style="stop-color:#ff9800"/>
    </linearGradient>
    <linearGradient id="cool" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#29b6f6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#4fc3f7" flood-opacity="0.3"/>
    </filter>
    <filter id="warm-glow">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#ff9800" flood-opacity="0.25"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Background waves -->
  <path d="M0,300 Q200,270 400,290 Q600,310 800,280 L800,400 L0,400 Z" fill="#274c77" opacity="0.15"/>
  <path d="M0,330 Q200,310 400,325 Q600,340 800,315 L800,400 L0,400 Z" fill="#274c77" opacity="0.1"/>

  <!-- Soft background circles -->
  <circle cx="340" cy="140" r="120" fill="#4fc3f7" opacity="0.03"/>
  <circle cx="460" cy="140" r="120" fill="#ff9800" opacity="0.03"/>

  <!-- Human figure (left side) -->
  <g transform="translate(330, 135)" filter="url(#warm-glow)">
    <!-- Head -->
    <circle cx="0" cy="-35" r="18" fill="url(#warm)" opacity="0.9"/>
    <!-- Body -->
    <path d="M0,-17 L0,20" stroke="#ffb74d" stroke-width="4" stroke-linecap="round"/>
    <!-- Arms - right arm reaching out -->
    <path d="M0,-5 L-18,8" stroke="#ffb74d" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M0,-5 L22,0" stroke="#ffb74d" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Legs -->
    <path d="M0,20 L-12,42" stroke="#ffb74d" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M0,20 L12,42" stroke="#ffb74d" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Face hint -->
    <circle cx="-5" cy="-37" r="2" fill="#0d1b2a" opacity="0.5"/>
    <circle cx="5" cy="-37" r="2" fill="#0d1b2a" opacity="0.5"/>
    <path d="M-4,-30 Q0,-27 4,-30" fill="none" stroke="#0d1b2a" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Robot figure (right side) -->
  <g transform="translate(470, 135)" filter="url(#shadow)">
    <!-- Head -->
    <rect x="-16" y="-50" width="32" height="28" rx="7" fill="url(#cool)" opacity="0.9"/>
    <!-- Antenna -->
    <line x1="0" y1="-50" x2="0" y2="-60" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="-63" r="4" fill="#80d8ff" filter="url(#glow)"/>
    <!-- Eyes -->
    <circle cx="-6" cy="-40" r="4" fill="#0d1b2a"/>
    <circle cx="6" cy="-40" r="4" fill="#0d1b2a"/>
    <circle cx="-5" cy="-41" r="1.5" fill="#80d8ff"/>
    <circle cx="7" cy="-41" r="1.5" fill="#80d8ff"/>
    <!-- Body -->
    <rect x="-14" y="-20" width="28" height="32" rx="6" fill="url(#cool)" opacity="0.9"/>
    <!-- Chest light -->
    <circle cx="0" cy="-6" r="4" fill="#0d1b2a" opacity="0.4"/>
    <circle cx="0" cy="-6" r="2" fill="#80d8ff" opacity="0.8"/>
    <!-- Arms - left arm reaching out -->
    <path d="M-14,-12 L-28,-5" stroke="#4fc3f7" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M14,-12 L22,0" stroke="#4fc3f7" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Legs -->
    <rect x="-10" y="12" width="7" height="18" rx="3" fill="url(#cool)" opacity="0.85"/>
    <rect x="3" y="12" width="7" height="18" rx="3" fill="url(#cool)" opacity="0.85"/>
  </g>

  <!-- Handshake area (center, where hands meet) -->
  <g transform="translate(400, 135)" filter="url(#glow)">
    <!-- Connection glow -->
    <circle r="15" fill="#ffffff" opacity="0.08"/>
    <circle r="10" fill="#ffffff" opacity="0.05"/>
    <!-- Clasped hands simplified -->
    <path d="M-8,-2 Q-4,-8 0,-5 Q4,-8 8,-2 Q6,4 0,6 Q-6,4 -8,-2 Z" fill="#ffffff" opacity="0.25"/>
    <!-- Spark effects -->
    <line x1="-5" y1="-12" x2="-8" y2="-18" stroke="#ffffff" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
    <line x1="5" y1="-12" x2="8" y2="-18" stroke="#ffffff" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
    <line x1="0" y1="-13" x2="0" y2="-20" stroke="#ffffff" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Circular loop around both figures -->
  <ellipse cx="400" cy="140" rx="110" ry="75" fill="none" stroke="#4fc3f7" stroke-width="1" stroke-dasharray="8,4" opacity="0.2"/>
  <!-- Arrow on the loop -->
  <g transform="translate(400, 65)" opacity="0.35">
    <polygon points="0,-3 6,5 -6,5" fill="#4fc3f7"/>
  </g>

  <!-- Title -->
  <text x="400" y="280" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff" letter-spacing="1">Human-in-the-Loop</text>

  <!-- Subtitle line -->
  <line x1="280" y1="300" x2="520" y2="300" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>

  <!-- Bottom accent bar -->
  <rect y="390" width="800" height="10" fill="url(#accent)" opacity="0.8"/>
</svg>